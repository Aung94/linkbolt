*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;transition:background .3s}
a{text-decoration:none;color:inherit}
.container{width:100%;max-width:680px;padding:40px 20px 60px;display:flex;flex-direction:column;align-items:center;min-height:100vh}
.avatar{width:96px;height:96px;border-radius:50%;object-fit:cover;margin-bottom:16px;border:3px solid rgba(255,255,255,.2);opacity:0;animation:fadeUp .6s ease forwards}
.avatar-placeholder{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;margin-bottom:16px;border:3px solid rgba(255,255,255,.2);opacity:0;animation:fadeUp .6s ease forwards}
.display-name{font-size:24px;font-weight:700;margin-bottom:6px;text-align:center;opacity:0;animation:fadeUp .6s ease forwards;animation-delay:.1s}
.bio{font-size:15px;opacity:.8;text-align:center;margin-bottom:28px;max-width:420px;line-height:1.5;animation:fadeUp .6s ease forwards;animation-delay:.15s;opacity:0}
.links-wrapper{width:100%;display:flex;flex-direction:column;gap:14px;align-items:center}
.link-btn{display:flex;align-items:center;justify-content:center;width:100%;max-width:600px;padding:16px 24px;border-radius:12px;font-size:16px;font-weight:600;text-align:center;cursor:pointer;transition:transform .18s ease,box-shadow .18s ease;position:relative;overflow:hidden;min-height:56px}
.link-btn:hover{transform:translateY(-2px) scale(1.01)}
.link-btn:active{transform:scale(.98)}
.header-block{width:100%;max-width:600px;padding:10px 0;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;text-align:center}
.branding{margin-top:auto;padding-top:40px;text-align:center;font-size:13px;opacity:.5;transition:opacity .2s}
.branding:hover{opacity:.8}
.branding a{display:inline-flex;align-items:center;gap:4px}
.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:20px}
.not-found h1{font-size:80px;font-weight:800;margin-bottom:8px;opacity:.15}
.not-found h2{font-size:24px;font-weight:700;margin-bottom:12px}
.not-found p{font-size:16px;opacity:.6;margin-bottom:32px;max-width:360px;line-height:1.5}
.not-found .cta-btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;border-radius:50px;font-size:16px;font-weight:700;background:#6366f1;color:#fff;transition:transform .2s,box-shadow .2s}
.not-found .cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(99,102,241,.4)}
.ad-unit{width:100%;max-width:680px;margin-top:24px;text-align:center;min-height:100px}
.ad-unit-inline{width:100%;max-width:600px;margin:10px auto;text-align:center;min-height:90px}
.socials-row{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:24px;opacity:0;animation:fadeUp .6s ease forwards;animation-delay:.2s}
.social-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .18s ease,box-shadow .18s ease;cursor:pointer}
.social-icon:hover{transform:translateY(-2px) scale(1.1)}
.social-icon svg{width:20px;height:20px;fill:#fff}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes animFade{from{opacity:0}to{opacity:1}}
@keyframes animSlide{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes animScale{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
@media(max-width:480px){.container{padding:32px 16px 48px}.display-name{font-size:22px}.link-btn{padding:15px 20px;font-size:15px;min-height:52px;border-radius:10px}}

function getUser(username){
if(!username)return null;
try{
const users=JSON.parse(localStorage.getItem('linkbolt_users')||'{}');
if(users[username])return users[username];
}catch(e){}
try{
const single=JSON.parse(localStorage.getItem('linkbolt_user')||'null');
if(single&&single.username===username)return single;
}catch(e){}
return null;
}

function trackView(username){
const key='linkbolt_analytics_'+username;
let data;
try{data=JSON.parse(localStorage.getItem(key))||{};}catch(e){data={};}
data.totalViews=(data.totalViews||0)+1;
if(!data.clicks)data.clicks={};
localStorage.setItem(key,JSON.stringify(data));
}

function trackClick(username,linkId){
const key='linkbolt_analytics_'+username;
let data;
try{data=JSON.parse(localStorage.getItem(key))||{};}catch(e){data={};}
if(!data.clicks)data.clicks={};
data.clicks[linkId]=(data.clicks[linkId]||0)+1;
localStorage.setItem(key,JSON.stringify(data));
}

function setMeta(user){
const title=user.displayName+' | LinkBolt';
document.title=title;
document.querySelector('meta[name="description"]').setAttribute('content',user.bio||'');
document.querySelector('meta[property="og:title"]').setAttribute('content',title);
document.querySelector('meta[property="og:description"]').setAttribute('content',user.bio||'Check out my links');
document.querySelector('meta[property="og:url"]').setAttribute('content',window.location.href);
if(user.avatar)document.querySelector('meta[property="og:image"]').setAttribute('content',user.avatar);
}

function applyTheme(themeName){
const t=THEMES[themeName]||THEMES['minimal-dark'];
const bg=t.bg;
if(bg.includes('gradient')){
document.body.style.background=bg;
document.body.style.backgroundAttachment='fixed';
}else{
document.body.style.backgroundColor=bg;
}
return t;
}

function getButtonStyles(style,theme){
const base='width:100%;max-width:600px;';
const bg=theme.button;
const color=theme.buttonText;
const border=theme.buttonBorder||theme.button;
switch(style){
case'outline':return base+'background:transparent;border:2px solid '+border+';color:'+border+';border-radius:12px;';
case'rounded':return base+'background:'+bg+';color:'+color+';border:none;border-radius:50px;';
case'shadow':return base+'background:'+bg+';color:'+color+';border:none;border-radius:12px;box-shadow:0 4px 15px '+(bg==='transparent'?'rgba(232,121,249,.3)':bg+'44')+';';
case'filled':default:return base+'background:'+bg+';color:'+color+';border:none;border-radius:12px;';
}
}

function renderSocials(socials,theme){
if(!socials||!socials.length)return'';
var html='<div class="socials-row">';
socials.forEach(function(s){
var meta=SOCIAL_META[s.platform];
if(!meta)return;
var bg=meta.color;
if(bg==='#000000'||bg==='#FFFC00')bg=theme.button;
html+='<a class="social-icon" href="'+escHtml(s.url)+'" target="_blank" rel="noopener noreferrer" style="background:'+bg+'" title="'+escHtml(s.platform)+'">'+meta.svg+'</a>';
});
html+='</div>';
return html;
}

function getAnimProps(animation,index){
var anim=animation||'stagger';
switch(anim){
case'none':return'opacity:1;';
case'fade':return'opacity:0;animation:animFade .5s ease forwards;animation-delay:.25s;';
case'slide':return'opacity:0;animation:animSlide .5s ease forwards;animation-delay:.25s;';
case'scale':return'opacity:0;animation:animScale .5s ease forwards;animation-delay:.25s;';
case'stagger':default:return'opacity:0;animation:animFade .5s ease forwards;animation-delay:'+(.25+index*.1).toFixed(2)+'s;';
}
}

function renderMidAd(){
return'<div class="ad-unit-inline"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-2850355877461307" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins></div>';
}

function renderProfile(user,isDemo){
const theme=applyTheme(user.theme);
const font=FONTS[user.font]||FONTS.sans;
document.body.style.fontFamily=font;
document.body.style.color=theme.text;
setMeta(user);

const username=user.username||'demo';
if(!isDemo)trackView(username);

const activeLinks=(user.links||[]).filter(function(l){return l.active!==false;});
let avatarHtml;
if(user.avatar){
avatarHtml='<img class="avatar" src="'+escHtml(user.avatar)+'" alt="'+escHtml(user.displayName)+'" onerror="this.style.display=\'none\'">';
}else{
const initials=(user.displayName||'?').charAt(0).toUpperCase();
avatarHtml='<div class="avatar-placeholder" style="background:'+theme.button+';color:'+theme.buttonText+'">'+initials+'</div>';
}

const socialsHtml=renderSocials(user.socials,theme);

const anim=user.animation||'stagger';
let linksHtml='';
let linkIndex=0;
let linkOnlyCount=activeLinks.filter(function(l){return l.type!=='header';}).length;
let linkOnlyIdx=0;
let midAdInserted=false;
activeLinks.forEach(function(link,i){
var animStyle=getAnimProps(anim,linkIndex);
if(link.type==='header'){
linksHtml+='<div class="header-block" style="'+animStyle+'color:'+theme.text+';opacity:.5">'+escHtml(link.title)+'</div>';
}else{
linkOnlyIdx++;
if(!midAdInserted&&linkOnlyCount>=5&&linkOnlyIdx===4){
linksHtml+=renderMidAd();
midAdInserted=true;
}
const btnStyle=getButtonStyles(user.buttonStyle,theme);
linksHtml+='<a class="link-btn" href="'+escHtml(link.url)+'" target="_blank" rel="noopener noreferrer" data-link-id="'+escHtml(link.id)+'" data-username="'+escHtml(username)+'" style="'+btnStyle+animStyle+'backdrop-filter:blur(10px);">'+escHtml(link.title)+'</a>';
linkIndex++;
}
});

const showBranding=user.showBranding!==false;
const brandingHtml=showBranding?'<div class="branding" style="animation:fadeUp .5s ease forwards;animation-delay:'+(0.25+activeLinks.length*.1+.1).toFixed(2)+'s;opacity:0"><a href="index.html">\u26A1 Made with LinkBolt \u2014 Create your free page</a></div>':'';
const demoNotice=isDemo?'<div style="position:fixed;top:0;left:0;right:0;background:linear-gradient(90deg,#6366f1,#8b5cf6);color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:600;z-index:999;animation:fadeUp .4s ease">This is a demo profile \u2014 <a href="index.html" style="color:#fde68a;text-decoration:underline">Create your own for free</a></div>':'';
const topPad=isDemo?'padding-top:52px;':'';

document.getElementById('app').innerHTML=demoNotice+'<div class="container" style="'+topPad+'">'+avatarHtml+'<div class="display-name">'+escHtml(user.displayName)+'</div><div class="bio">'+escHtml(user.bio||'')+'</div>'+socialsHtml+'<div class="links-wrapper">'+linksHtml+'</div>'+brandingHtml+'</div>';

document.querySelectorAll('.link-btn').forEach(function(btn){
btn.addEventListener('click',function(e){
var lid=btn.getAttribute('data-link-id');
var uname=btn.getAttribute('data-username');
if(lid&&uname)trackClick(uname,lid);
});
});

try{document.querySelectorAll('.adsbygoogle').forEach(function(ad){if(!ad.getAttribute('data-ad-status')){(adsbygoogle=window.adsbygoogle||[]).push({});}});}catch(e){}
}

function render404(){
document.body.style.backgroundColor='#0f0f0f';
document.body.style.color='#ffffff';
document.body.style.fontFamily=FONTS.sans;
document.title='Page Not Found | LinkBolt';
document.getElementById('app').innerHTML='<div class="not-found"><h1>404</h1><h2>This page doesn\u2019t exist yet</h2><p>The link you followed may be broken, or this person hasn\u2019t created their page.</p><a class="cta-btn" href="index.html">\u26A1 Create yours free</a></div>';
}

function escHtml(str){
if(!str)return'';
var d=document.createElement('div');
d.appendChild(document.createTextNode(str));
return d.innerHTML;
}

function init(){
const params=new URLSearchParams(window.location.search);
const username=params.get('user');

if(!username){
renderProfile(DEMO_USER,true);
return;
}

const user=getUser(username);
if(!user){
render404();
return;
}
renderProfile(user,false);
}

init();

/* ad pushes handled in renderProfile */
})();
</script>
</body>
</html>
